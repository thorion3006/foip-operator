{{- range .Values.failoverIps }}
---
apiVersion: foip.noshoes.xyz/v1
kind: FailoverIp
metadata:
  name: {{ .name }}
  labels:
    {{- include "foip-operator.labels" $ | nindent 4 }}
spec:
  ip: {{ .ip }}
  secretName: {{ .secretName }}
  {{- with .providerCooldownSeconds }}
  providerCooldownSeconds: {{ . }}
  {{- end }}
  {{- with .retryBaseSeconds }}
  retryBaseSeconds: {{ . }}
  {{- end }}
  {{- with .retryMaxSeconds }}
  retryMaxSeconds: {{ . }}
  {{- end }}
  {{- with .failureThreshold }}
  failureThreshold: {{ . }}
  {{- end }}
  {{- with .recoveryThreshold }}
  recoveryThreshold: {{ . }}
  {{- end }}
  {{- with .cleanupMaxAttempts }}
  cleanupMaxAttempts: {{ . }}
  {{- end }}
  {{- with .cleanupRetrySeconds }}
  cleanupRetrySeconds: {{ . }}
  {{- end }}
  {{- with .stabilizationSeconds }}
  stabilizationSeconds: {{ . }}
  {{- end }}
  {{- with .minHealthySeconds }}
  minHealthySeconds: {{ . }}
  {{- end }}
  {{- if .preferCurrentOwner }}
  preferCurrentOwner: true
  {{- end }}
  {{- with .recoveryPolicy }}
  recoveryPolicy: {{ . }}
  {{- end }}
  {{- with .probeComposition }}
  probeComposition: {{ . }}
  {{- end }}
  {{- with .probeQuorum }}
  probeQuorum: {{ . }}
  {{- end }}
  {{- with .probes }}
  probes:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- range .Values.failoverProbes }}
---
apiVersion: foip.noshoes.xyz/v1
kind: FailoverProbe
metadata:
  name: {{ .name }}
  labels:
    {{- include "foip-operator.labels" $ | nindent 4 }}
spec:
  {{- omit . "name" | toYaml | nindent 2 }}
{{- end }}
