apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "foip-operator.fullname" . }}-controller
  labels:
    {{- include "foip-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "foip-operator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      {{- with .Values.controller.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "foip-operator.labels" . | nindent 8 }}
        app.kubernetes.io/component: controller
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "foip-operator.controller.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.controller.podSecurityContext | nindent 8 }}
      containers:
      - name: controller
        image: {{ include "foip-operator.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: [/foip]
        env:
          - name: WATCH_NAMESPACE
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.namespace
{{- if and .Values.observability.traces.enabled .Values.observability.otlp.endpoint }}
{{ include "foip-operator.observabilityEnv" (dict "root" . "component" "foip") | nindent 10 }}
{{- end }}
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
          - --metrics-bind-address={{ include "foip-operator.metricsBindAddress" . }}
        securityContext:
          {{- toYaml .Values.controller.securityContext | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        {{- with .Values.controller.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.controller.affinity .Values.controller.podAntiAffinity.enabled }}
      affinity:
        {{- with .Values.controller.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- else }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                {{- include "foip-operator.selectorLabels" . | nindent 16 }}
                app.kubernetes.io/component: controller
            topologyKey: kubernetes.io/hostname
        {{- end }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 10
