image:
  repository: ghcr.io/thorion3006/foip-operator/operator
  pullPolicy: IfNotPresent
  # Overrides the image tag; defaults to the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# FailoverIp resources to create at install time.
# - name: my-foip
#   ip: 1.2.3.4
#   secretName: netcup-scp-credentials
#   providerCooldownSeconds: 60
#   stabilizationSeconds: 30
#   recoveryPolicy: HoldDualOwnership
#   probeComposition: All
#   probes: []
failoverIps: []

# Reusable, ingress-neutral probes to install with the chart.
failoverProbes: []

# Additional pre-existing secrets the foip operator should be allowed to read.
# Secrets referenced in failoverIps are included automatically.
existingSecrets: []

controller:
  replicas: 2
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  podAntiAffinity:
    enabled: true
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

nodeInterface:
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
      add: [NET_ADMIN]
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

observability:
  metrics:
    enabled: true
  traces:
    enabled: true
  otlp:
    endpoint: ""
    insecure: true
