name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/thorion3006/foip-operator/operator

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      timestamp: ${{ steps.meta.outputs.timestamp }}
      created: ${{ steps.meta.outputs.created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect build metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          epoch=$(git show -s --no-show-signature --format=%ct HEAD)
          echo "timestamp=$epoch" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u -d "@$epoch" +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  build-amd64:
    name: Build linux/amd64 image
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and push amd64 image
        id: build
        uses: docker/build-push-action@v6
        env:
          SOURCE_DATE_EPOCH: ${{ needs.prepare.outputs.timestamp }}
        with:
          context: .
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=release-amd64
          cache-to: type=gha,mode=max,scope=release-amd64
          tags: |
            ${{ env.IMAGE }}:${{ needs.prepare.outputs.version }}-amd64
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ needs.prepare.outputs.created }}

      - name: Save amd64 digest
        run: |
          printf '%s\n' '${{ steps.build.outputs.digest }}' > amd64.digest

      - name: Upload amd64 digest
        uses: actions/upload-artifact@v4
        with:
          name: amd64-digest
          path: amd64.digest
          if-no-files-found: error

  build-arm64:
    name: Build linux/arm64 image
    runs-on: ubuntu-24.04-arm
    needs: prepare
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and push arm64 image
        id: build
        uses: docker/build-push-action@v6
        env:
          SOURCE_DATE_EPOCH: ${{ needs.prepare.outputs.timestamp }}
        with:
          context: .
          push: true
          platforms: linux/arm64
          cache-from: type=gha,scope=release-arm64
          cache-to: type=gha,mode=max,scope=release-arm64
          tags: |
            ${{ env.IMAGE }}:${{ needs.prepare.outputs.version }}-arm64
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ needs.prepare.outputs.created }}

      - name: Save arm64 digest
        run: |
          printf '%s\n' '${{ steps.build.outputs.digest }}' > arm64.digest

      - name: Upload arm64 digest
        uses: actions/upload-artifact@v4
        with:
          name: arm64-digest
          path: arm64.digest
          if-no-files-found: error

  release:
    name: Publish manifest, sign, and package chart
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-amd64
      - build-arm64
      - validate
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Download amd64 digest
        uses: actions/download-artifact@v4
        with:
          name: amd64-digest
          path: digests/amd64-digest

      - name: Download arm64 digest
        uses: actions/download-artifact@v4
        with:
          name: arm64-digest
          path: digests/arm64-digest

      - name: Create and push manifest list
        id: manifest
        run: |
          amd64_digest=$(cat digests/amd64-digest/amd64.digest)
          arm64_digest=$(cat digests/arm64-digest/arm64.digest)
          manifest_output=$(docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.source=https://github.com/thorion3006/foip-operator" \
            --annotation "index:org.opencontainers.image.url=https://github.com/thorion3006/foip-operator" \
            --annotation "index:org.opencontainers.image.documentation=https://github.com/thorion3006/foip-operator#readme" \
            --annotation "index:org.opencontainers.image.title=foip-operator" \
            --annotation "index:org.opencontainers.image.description=Netcup failover IP operator" \
            --annotation "index:org.opencontainers.image.vendor=thorion3006" \
            --annotation "index:org.opencontainers.image.authors=Sajeev Ramasamy <thorion3006@gmail.com>" \
            --annotation "index:org.opencontainers.image.version=${{ needs.prepare.outputs.version }}" \
            --annotation "index:org.opencontainers.image.revision=${{ github.sha }}" \
            --annotation "index:org.opencontainers.image.created=${{ needs.prepare.outputs.created }}" \
            --annotation "index:org.opencontainers.image.licenses=Apache-2.0" \
            --tag "${IMAGE}:${{ needs.prepare.outputs.version }}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}@${amd64_digest}" \
            "${IMAGE}@${arm64_digest}" 2>&1)
          manifest_digest=$(printf '%s\n' "$manifest_output" | grep -oE 'sha256:[a-f0-9]{64}' | tail -n1)
          if [ -z "$manifest_digest" ]; then
            printf '%s\n' "$manifest_output" >&2
            echo "Failed to determine manifest digest" >&2
            exit 1
          fi
          echo "digest=$manifest_digest" >> "$GITHUB_OUTPUT"

      - name: Verify published image architectures
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
          IMAGE: ${{ env.IMAGE }}
        run: |
          docker buildx imagetools inspect "${IMAGE}@${DIGEST}" --raw > manifest.json
          jq -e '[.manifests[] | select(.platform.architecture == "amd64" and .platform.os == "linux")] | length == 1' manifest.json
          jq -e '[.manifests[] | select(.platform.architecture == "arm64" and .platform.os == "linux")] | length == 1' manifest.json

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.manifest.outputs.digest }}
          output-file: sbom.spdx.json
          format: spdx-json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest image provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Attest image SBOM
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true
          create-storage-record: false

      - name: Sign image digest
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
          IMAGE: ${{ env.IMAGE }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package and push chart
        run: |
          mkdir -p dist
          helm package charts/foip-operator \
            --version ${{ needs.prepare.outputs.version }} \
            --app-version ${{ needs.prepare.outputs.version }} \
            --destination dist/
          helm push dist/foip-operator-${{ needs.prepare.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/thorion3006

  validate:
    name: Validate release contracts
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run deterministic packaging and release checks
        run: ./hack/validate-packaging.sh

      - name: Run deterministic restart and release checks
        run: go test ./test/e2e -run 'TestPersistedState|TestReleaseWorkflow' -count=1 -v
