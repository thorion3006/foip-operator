name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/niklasbeierl/foip-operator/operator

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package and push chart
        run: |
          helm package charts/foip-operator \
            --version ${{ steps.version.outputs.version }} \
            --app-version ${{ steps.version.outputs.version }} \
            --destination dist/
          helm push dist/foip-operator-${{ steps.version.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/niklasbeierl
