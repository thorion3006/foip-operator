name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/thorion3006/foip-operator/operator

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Collect build metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          epoch=$(git show -s --no-show-signature --format=%ct HEAD)
          echo "timestamp=$epoch" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u -d "@$epoch" +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build-and-push
        uses: docker/build-push-action@v6
        env:
          SOURCE_DATE_EPOCH: ${{ steps.meta.outputs.timestamp }}
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.created }}
          sbom: true

      - name: Attest image provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Sign image digest
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          IMAGE: ${{ env.IMAGE }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package and push chart
        run: |
          helm package charts/foip-operator \
            --version ${{ steps.meta.outputs.version }} \
            --app-version ${{ steps.meta.outputs.version }} \
            --destination dist/
          helm push dist/foip-operator-${{ steps.meta.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/thorion3006
