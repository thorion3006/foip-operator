name: E2E Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  deterministic-validation:
    name: Validate restart and release contracts
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run deterministic validation checks
        run: go test ./test/e2e -run 'TestReleaseWorkflow' -count=1 -v

  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Running Test e2e
        env:
          CONTAINER_TOOL: docker
        run: |
          go mod tidy
          make test-e2e
