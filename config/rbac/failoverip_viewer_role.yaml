# This rule is not used by the project foip-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to netcup.foip.noshoes.xyz resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: foip-operator
    app.kubernetes.io/managed-by: kustomize
  name: failoverip-viewer-role
rules:
- apiGroups:
  - netcup.foip.noshoes.xyz
  resources:
  - failoverips
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - netcup.foip.noshoes.xyz
  resources:
  - failoverips/status
  verbs:
  - get
