# This rule is not used by the project foip-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the netcup.foip.noshoes.xyz.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: foip-operator
    app.kubernetes.io/managed-by: kustomize
  name: failoverip-editor-role
rules:
- apiGroups:
  - netcup.foip.noshoes.xyz
  resources:
  - failoverips
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - netcup.foip.noshoes.xyz
  resources:
  - failoverips/status
  verbs:
  - get
